name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: Adversarial review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request.

            Read `.github/adversarial-review.md` and follow it exactly — it is the
            review checklist for this repository.

            If `CLAUDE.md` or `GUARDRAILS.md` exist, read them for the invariants this
            codebase must hold. A change that breaks a documented invariant is a finding
            even if the tests pass. If neither file exists, review against the checklist
            alone and note in your summary that this repo has no documented invariants
            yet — that is itself worth flagging.

            Scope your review to the PR diff (`gh pr diff`), but you MUST search the
            wider repository when checking for other paths to the same sink. That is
            the highest-value part of the review and it cannot be done from the diff
            alone.

            The PR branch is already checked out in the working directory.

            Use `gh pr comment` for the top-level review.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for specific lines.
            Only post GitHub comments — do not return the review as a message.

          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git show:*),Bash(git diff:*)"
